{% extends "basic_template.html" %}

{% block title %}
Formulario
{% endblock %}

{% block content %}

<form action="/form" method="POST">

    <label for="name">Nombre</label>
    <input type="text" id="name" name="employee_name" placeholder="Introduce tu nombre aquí..."
        required style="margin-bottom:20px">

    {# campo para edad #}
    <label for="age">Edad</label>
    <input type="number" id="age" name="age" min="18" max="65" 
    style="margin-bottom:20px" />

    {# radio button para empresa #}
    <label>Empresa</label>
    <div class="radio-group" style="margin-bottom:20px">
        {% for company in companies %}
            <div class="radio-item">
                <input type="radio" id="radio_company{{loop.index}}"
                name="company" value="{{company}}" />
                <label for="radio_company{{loop.index}}">{{company}}</label>
            </div>
        {% endfor %}
    </div>

    {# departamento #}
    <label for="position">Departamento</label>
    <select id="position" name="position" style="margin-bottom: 40px">
        
        <option value="">-- Selecciona un puesto --</option>
        {% for job_pos in job_positions %}
            <option value="{{job_pos}}">{{job_pos}}</option>
        {% endfor %}
    </select>

    <button  type="submit">Enviar datos</button>
</form>

{% endblock %}
