<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Flask App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <!-- Header with links -->
        <nav>
            <ul>
                <li>
                    <a href="{{url_for('index')}}">Inicio</a>
                </li>

                <li>
                    <a href="{{url_for('greet')}}">Saludar</a>
                </li>

                <li>
                    <a href="{{url_for('show_links')}}">Rutas disponibles</a>
                </li>

                <li>
                    <a href="{{url_for('form')}}">Formulario</a>
                </li>
            </ul>
        </nav>

        <h1>
            {% block title %}
            {% endblock %}
        </h1>
    
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>My Python Course</p>
    </footer>
</body>
</html>
